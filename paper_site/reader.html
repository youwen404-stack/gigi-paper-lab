<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gigi Paper Lab Reader</title>
    <meta
      name="description"
      content="在线阅读 Gigi Paper Lab 的论文笔记与 reflection。"
    />
    <link rel="stylesheet" href="./assets/styles.css" />
    <link rel="icon" href="data:," />
  </head>
  <body class="reader-body">
    <div class="page-shell reader-shell">
      <header class="reader-header">
        <a class="reader-back" href="./index.html">Back to Gigi Paper Lab</a>
        <div class="reader-hero">
          <span class="eyebrow" id="reader-kind">Paper</span>
          <h1 id="reader-title">Loading…</h1>
          <p class="hero-text" id="reader-subtitle">正在载入内容。</p>
          <div class="feature-meta" id="reader-links"></div>
        </div>
      </header>

      <main class="reader-layout">
        <aside class="reader-sidebar glass-panel">
          <div class="reader-sidebar-block">
            <span class="meta-label">Collection</span>
            <p id="reader-track">Gigi Paper Lab</p>
          </div>
          <div class="reader-sidebar-block">
            <span class="meta-label">Document</span>
            <p id="reader-document">Loading…</p>
          </div>
          <div class="reader-sidebar-block">
            <span class="meta-label">Context</span>
            <p id="reader-context">正在整理阅读上下文。</p>
          </div>
        </aside>

        <article class="reader-article glass-panel" id="reader-content">
          <p>Loading content…</p>
        </article>
      </main>
    </div>

    <script src="./assets/reader.js"></script>
  </body>
</html>
